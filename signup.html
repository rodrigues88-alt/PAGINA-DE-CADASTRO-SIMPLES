<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>
<body>
    <main class="container">
      <section class="left">
        <h1>Nova conta</h1>

        <form class="form">
         <input class="input" type="text" placeholder="Nome" name="name">
        
        <input class="input" type="email" placeholder="E-mail" name="email">

        <input class="input" type="password" placeholder="Senha" name="password">

            <div class="area">      
                <input type="radio" name="termos" id="termos">
                <span>Eu aceito os termos e condições.</span>
            </div>


        <button class="button" type="submit">Cadastrar</button>
        </form>

        <div class="area">
            <span>Já tem uma conta? <a class="link" href="index.html">Entrar</a></span>
        </div>

      </section>

      <section class="right">
        <img src="assets/info.png" alt="Imagem de login">

       <h2>Leve sua carreira ao proximo passo</h2>

       <p class="descrição">
        Faça login ou cadastre-se para acessar milhares de vagas de emprego, cursos e conteúdos exclusivos para impulsionar sua carreira.
       </p>
      </section>
    </main>
</body>
</html>
